#      branch: main
#  - app-linux-input-proxy:
#      branch: main
#  - app-linux-usb-proxy:
#      branch: main
#  - meta-packages
  - fwupd


executor:
  type: qubes
  options:
    dispvm: "executor-dvm"

stages:
  - fetch
  - prep
  - build
  - post
  - verify
  - sign:
      executor:
        type: local
  - publish:
      executor:
        type: local
  - upload:
      executor:
        type: local
