  - vmm-xen
  - vmm-xen-guest
  - core-vchan-xen
  - core-qubesdb
  - core-qrexec
  - linux-utils
  - core-agent-linux
  - gui-common
  - gui-agent-linux
  - app-linux-split-gpg:
      branch: main
  - app-linux-input-proxy:
      branch: main
  - app-linux-usb-proxy:
      branch: main
  - app-linux-pdf-converter:
      branch: main
  - app-linux-img-converter:
      branch: main
#  - mgmt-salt:
#      branch: main
  - fwupd:
      branch: release4.3
  - repo-templates:
      branch: main
  - meta-packages
  - salt:
      branch: main


executor:
 type: qubes
 options:
   dispvm: "executor-dvm"

stages:
  - fetch
  - prep
  - build
